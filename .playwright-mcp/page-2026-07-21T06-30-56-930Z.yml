                      - text: 6 and 7, with a greater focus on consumer protection outcomes for
                      - link "retail customers" [ref=f2e694] [cursor=pointer]:
                        - /url: /glossary/G1327
                      - text: ", including where those"
                      - link "retail customers" [ref=f2e695] [cursor=pointer]:
